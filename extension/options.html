<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AP Study ヒント設定</title>
    <style>
      body {
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
      }
      main {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        margin: 0 auto;
        max-width: 640px;
        padding: 24px;
      }
      h1 {
        font-size: 22px;
        margin: 0;
      }
      p {
        line-height: 1.7;
      }
      label {
        display: block;
        font-weight: 700;
        margin-top: 20px;
      }
      input {
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        box-sizing: border-box;
        font: inherit;
        margin-top: 8px;
        min-height: 44px;
        padding: 10px 12px;
        width: 100%;
      }
      button {
        background: #0f766e;
        border: 0;
        border-radius: 12px;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        margin-top: 16px;
        min-height: 44px;
        padding: 10px 18px;
      }
      .note {
        background: #f0fdfa;
        border-radius: 12px;
        color: #115e59;
        font-size: 13px;
        padding: 12px;
      }
      #message {
        font-weight: 700;
        min-height: 24px;
      }
      #message.success {
        color: #0f766e;
      }
      #message.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AP Study ヒント設定</h1>
      <p>
        Anthropic APIキーを保存すると、過去問ページ上の「ヒント」ボタンから段階的なAIヒントを生成できます。
      </p>
      <p class="note">
        APIキーはこの端末のChrome拡張機能ストレージに保存されます。リポジトリやGitHub Pagesには保存されません。共有端末では使わないでください。
      </p>
      <form id="api-key-form">
        <label for="api-key-input">Anthropic APIキー</label>
        <input id="api-key-input" type="password" autocomplete="off" placeholder="sk-ant-..." />
        <button type="submit">保存</button>
      </form>
      <p id="message" aria-live="polite"></p>
    </main>
    <script src="runtime/options.js"></script>
  </body>
</html>
